# compliance-policy.yaml
# License and export control policy for vulnsweep compliance checks.
# Maintain this in a shared repo so all teams use the same rules.

# --- License Policy ---

licenses:
  # Approved licenses — no action needed
  approved:
    - MIT
    - ISC
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - BlueOak-1.0.0
    - Unlicense
    - CC0-1.0
    - 0BSD
    - Python-2.0
    - Zlib
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - GPL-3.0-or-later
    - AGPL-3.0-only
    - AGPL-3.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0-only
    - LGPL-3.0-or-later
    - MPL-2.0
    - EPL-1.0
    - EPL-2.0
    - CDDL-1.0
    - CDDL-1.1

  # Restricted licenses — not compatible with open source distribution
  # or carry non-commercial/use restrictions
  restricted:
    - SSPL-1.0
    - BUSL-1.1
    - CC-BY-NC-4.0
    - CC-BY-NC-SA-4.0
    - Hippocratic-2.1
    - Hippocratic-3.0

# --- Export Control Policy ---
# Packages matching these patterns are flagged for export control review.
#
# This does NOT make a legal determination — it surfaces packages that
# likely involve cryptography so a compliance reviewer can classify them
# under EAR/BIS (Bureau of Industry and Security).
#
# Background: Since Clinton's 1998 executive order demilitarized strong
# cryptography, this area has been a legal gray zone. In practice, crypto
# libraries are ubiquitous in open source and GitHub builds binaries for
# them routinely without enforcement action. BIS scrutiny is most likely
# for large commercial software providers (think: shipping an OS or
# office suite), not small internal tools.
#
# The one edge case worth thinking through: if the software runs on a
# distributed grid with nodes in ITAR-restricted countries, whether a
# compiled WebAssembly module containing crypto can legally transit to
# those nodes is an open question. For now, flag for review — don't block.
#
# This is intended for use by a compliance reviewer: typically a software
# person with legal background, or a paralegal with software background.

export_control:
  # Package name patterns (case-insensitive substring match)
  name_patterns:
    - crypto
    - cipher
    - sha256
    - sha512
    - sha-
    - sha1
    - sha2
    - sha3
    - hash
    - hashes
    - aes
    - rsa
    - ecdsa
    - ecdh
    - ed25519
    - curve25519
    - x25519
    - chacha
    - argon2
    - bcrypt
    - scrypt
    - pbkdf
    - hmac
    - tls
    - ssl
    - gpg
    - pgp
    - nacl
    - tweetnacl
    - noble
    - secp256k1
    - elliptic
    - bs58check
    - openpgp

  # Known crypto packages (exact name match, case-sensitive)
  # Add packages here that don't match name patterns but contain crypto
  known_packages:
    - "@noble/hashes"
    - "@noble/curves"
    - "@noble/ed25519"
    - fast-sha256
    - bs58check
    - tweetnacl
    - tweetnacl-util
    - libsodium
    - libsodium-wrappers
    - sodium-native
    - node-forge
    - elliptic
    - secp256k1
    - browserify-sign
    - browserify-cipher
    - create-hash
    - create-hmac
    - diffie-hellman
    - public-encrypt
    - randomfill
    - crypto-browserify

# --- Use Restrictions ---
# These cannot be fully automated. Packages flagged here require manual
# legal review. Add entries as your team reviews packages.
#
# Format:
#   - name: "package-name"
#     restriction: "Description of the restriction"
#     status: "approved | under-review | restricted"
#     reviewer: "Name"
#     date: "YYYY-MM-DD"
#     proof: "Reference to evidence (ticket ID, commit URL, etc.)"
#
# Examples:
#
#   Package flagged with no license — contacted maintainer, they added MIT:
#   - name: "some-package"
#     restriction: "No license — maintainer added MIT on 2026-03-15"
#     status: "approved"
#     reviewer: "Jane Doe"
#     date: "2026-03-15"
#     proof: "LIC-2026-001"
#
#   Package with Commons Clause — still under review:
#   - name: "another-package"
#     restriction: "Commons Clause — cannot sell as a service"
#     status: "under-review"
#     reviewer: "Jane Doe"
#     date: "2026-03-01"
#     proof: "LIC-2026-002"
#
#   Package reviewed and blocked — license changed to SSPL:
#   - name: "bad-package"
#     restriction: "SSPL as of v4.0 — incompatible with government delivery"
#     status: "restricted"
#     reviewer: "Jane Doe"
#     date: "2026-03-10"
#     proof: "LIC-2026-003"

use_restrictions: []
